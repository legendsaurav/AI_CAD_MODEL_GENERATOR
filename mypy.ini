[mypy]
# Base import behaviour mirrors the CI flag (--ignore-missing-imports) and keeps
# type-checking resilient across the multi-package repo layout, where each
# top-level dir (geometry-engine/, cad-planner/, MODEL_GENERATOR_V2/) is placed
# on sys.path at runtime rather than imported via a single root package.
ignore_missing_imports = True
explicit_package_bases = True
namespace_packages = True

# Standalone entry-point scripts use runtime sys.path manipulation and are not
# importable as stable modules; checking them creates duplicate-module clashes
# without adding real type coverage.
exclude = (?x)(/scripts/|/tests/)
